<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>訂單報表產生器 (PDF解析版)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 10px;
      margin: 0;
    }
    h1 {
      text-align: center;
    }
    form, #report {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
    }
    form div {
      margin-bottom: 12px;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-weight: bold;
    }
    input[type="date"],
    input[type="number"],
    input[type="file"] {
      padding: 6px;
      font-size: 1rem;
      width: 100%;
      box-sizing: border-box;
    }
    .btn {
      width: 100%;
      max-width: 600px;
      display: block;
      margin: 15px auto;
      padding: 10px 12px;
      font-size: 1rem;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .btn:hover {
      background-color: #45a049;
    }
    .btn-parse {
      background-color: #FF9800;
    }
    .btn-parse:hover {
      background-color: #F57C00;
    }
    #downloadBtn {
      background-color: #008CBA;
    }
    table {
      border-collapse: collapse;
      margin-top: 20px;
      width: 100%;
      text-align: center;
      font-size: 0.9rem;
    }
    table, th, td {
      border: 1px solid #333;
      padding: 8px;
    }
    th {
      background-color: #f0f0f0;
    }
    tr:hover {
      background-color: #f9f9f9;
      cursor: pointer;
    }
    #overallTotalRow {
      background-color: #f0f0f0;
      font-weight: bold;
    }
    #balanceSummary {
      text-align: center;
      font-weight: bold;
      margin-top: 10px;
      white-space: pre-line;
      cursor: pointer;
    }
    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      padding: 10px;
      box-sizing: border-box;
    }
    .modal-content {
      background: #fff;
      padding: 20px;
      border-radius: 5px;
      width: 100%;
      max-width: 400px;
    }
    .modal-content form div {
      margin-bottom: 10px;
    }
    .modal-btns {
      text-align: center;
      margin-top: 15px;
    }
    .modal-btns button {
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
      font-size: 1rem;
    }
    #loadingMsg {
      display: none;
      color: #D32F2F;
      font-weight: bold;
      text-align: center;
      margin-top: 10px;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
</head>
<body>
  <h1>訂單報表產生器</h1>
  <form id="reportForm">
    <div>
      <label for="startDate">開始日期:</label>
      <input type="date" id="startDate" required>
    </div>
    <div>
      <label for="endDate">結束日期:</label>
      <input type="date" id="endDate" required>
    </div>
    <div>
      <label for="balanceInput">上期結餘 (餘額):</label>
      <input type="number" id="balanceInput" placeholder="無">
    </div>
    <div>
      <label for="advanceInput">預收金額:</label>
      <input type="number" id="advanceInput" placeholder="無">
    </div>
    
    <div style="background: #fff3e0; padding: 10px; border-radius: 5px; margin-top: 15px; border: 1px solid #ffcc80;">
      <label for="pdfFile">📄 上傳 LINE 對話紀錄 (.pdf):</label>
      <input type="file" id="pdfFile" accept=".pdf">
      <small style="color: #666;">※ 系統會自動解析 PDF 內的日期、產品與最新餘額。</small>
      <button type="button" class="btn btn-parse" onclick="processPDF()">解析 PDF 並生成報表</button>
      <div id="loadingMsg">⏳ 正在解析 PDF 文字，請稍候...</div>
    </div>
  </form>

  <div id="report"></div>
  <button id="downloadBtn" type="button" class="btn" style="display:none;" onclick="downloadReport()">下載表格 JPG</button>

  <div id="modalOverlay" class="modal-overlay">
    <div id="modal" class="modal-content">
      <h2 id="modalDate" style="text-align: center;"></h2>
      <form id="modalForm">
        <div>
          <label for="modalIsHoliday" style="display: inline-block;">設為休假:</label>
          <input type="checkbox" id="modalIsHoliday" onchange="toggleModalInputs()">
        </div>
        <div>
          <label for="modalNoodlesQty">麵線 (50元):</label>
          <input type="number" id="modalNoodlesQty" min="0" required>
        </div>
        <div>
          <label for="modalEggPancakeQty">蛋餅 (30元):</label>
          <input type="number" id="modalEggPancakeQty" min="0" required>
        </div>
        <div>
          <label for="modalFriedNoodlesQty">炒麵 (30元):</label>
          <input type="number" id="modalFriedNoodlesQty" min="0" required>
        </div>
        <div class="modal-btns">
          <button type="button" style="background:#4CAF50; color:white; border:none;" onclick="saveOrder()">儲存修改</button>
          <button type="button" onclick="closeModal()">取消</button>
        </div>
      </form>
    </div>
  </div>

  <div id="balanceModalOverlay" class="modal-overlay">
    <div id="balanceModal" class="modal-content">
      <h2 style="text-align: center;">調整餘額與預收</h2>
      <form id="balanceForm">
        <div>
          <label for="modalBalance">餘額:</label>
          <input type="number" id="modalBalance" placeholder="無">
        </div>
        <div>
          <label for="modalAdvance">預收:</label>
          <input type="number" id="modalAdvance" placeholder="無">
        </div>
        <div class="modal-btns">
          <button type="button" style="background:#4CAF50; color:white; border:none;" onclick="saveBalance()">儲存</button>
          <button type="button" onclick="closeBalanceModal()">取消</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    // 設定 PDF.js 的 Worker 來源
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    const prices = { noodles: 50, eggPancake: 30, friedNoodles: 30 };
    let orders = {}; 
    const weekdays = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
    let currentEditDate = null;

    function getLocalDateString(date) {
      const year = date.getFullYear();
      const month = (date.getMonth() + 1).toString().padStart(2, "0");
      const day = date.getDate().toString().padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    window.addEventListener("DOMContentLoaded", function() {
      const today = new Date();
      document.getElementById("endDate").value = getLocalDateString(today);
      const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
      document.getElementById("startDate").value = getLocalDateString(firstDay);
    });

    // --- 讀取並解析 PDF 檔案 ---
    async function processPDF() {
      const fileInput = document.getElementById('pdfFile');
      const startDateVal = document.getElementById("startDate").value;
      const endDateVal = document.getElementById("endDate").value;

      if (!startDateVal || !endDateVal) {
        alert("請確認首頁的開始與結束日期！");
        return;
      }

      if (!fileInput.files || fileInput.files.length === 0) {
        alert("請先選擇 PDF 檔案！");
        return;
      }

      document.getElementById("loadingMsg").style.display = "block";
      const file = fileInput.files[0];
      const fileReader = new FileReader();

      fileReader.onload = async function() {
        const typedarray = new Uint8Array(this.result);
        try {
          const pdf = await pdfjsLib.getDocument(typedarray).promise;
          let fullText = "";
          
          // 迴圈讀取每一頁的文字
          for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const textContent = await page.getTextContent();
            // 直接將每一頁的文字串接起來
            const pageText = textContent.items.map(item => item.str).join('');
            fullText += pageText;
          }
          
          parseTextData(fullText);
        } catch (error) {
          console.error("PDF 解析失敗:", error);
          alert("PDF 讀取失敗，請確認檔案是否損毀或加密。");
        } finally {
          document.getElementById("loadingMsg").style.display = "none";
        }
      };

      fileReader.readAsArrayBuffer(file);
    }

    // --- 強悍的文字分析邏輯 ---
    function parseTextData(text) {
      // 1. 去除所有的空白、換行字元，無視 PDF 版面走位問題
      const cleanText = text.replace(/\s+/g, '');

      // 2. 用「日期」作為刀子，把整串文字切成一塊一塊的區段
      // 匹配類似 2026/1/13 的格式
      const parts = cleanText.split(/(\d{4}\/\d{1,2}\/\d{1,2})/);

      orders = {}; 
      let balancesFound = []; 

      // parts 陣列結構會變成: [ "雜訊", "日期1", "對話內容1", "日期2", "對話內容2", ... ]
      for (let i = 1; i < parts.length; i += 2) {
        const dateStr = parts[i];
        const contentStr = parts[i+1] || "";

        // 解析出標準的 YYYY-MM-DD
        const dateMatch = dateStr.match(/(\d{4})\/(\d{1,2})\/(\d{1,2})/);
        if (!dateMatch) continue;
        
        const y = dateMatch[1];
        const m = dateMatch[2].padStart(2, '0');
        const d = dateMatch[3].padStart(2, '0');
        const currentDate = `${y}-${m}-${d}`;
        
        if (!orders[currentDate]) {
          orders[currentDate] = { isHoliday: false, noodles: 0, eggPancake: 0, friedNoodles: 0 };
        }

        // 解析商品數量 (利用 matchAll 避免同一天點兩次的情況，完美略過前面的贅字)
        const noodlesMatch = [...contentStr.matchAll(/麵線(\d+)/g)];
        noodlesMatch.forEach(m => orders[currentDate].noodles += parseInt(m[1], 10));

        const eggPancakeMatch = [...contentStr.matchAll(/蛋餅(\d+)/g)];
        eggPancakeMatch.forEach(m => orders[currentDate].eggPancake += parseInt(m[1], 10));

        const friedNoodlesMatch = [...contentStr.matchAll(/炒麵(\d+)/g)];
        friedNoodlesMatch.forEach(m => orders[currentDate].friedNoodles += parseInt(m[1], 10));

        // 解析餘額
        const balanceMatch = [...contentStr.matchAll(/餘額[:：]?(-?\d+)/g)];
        balanceMatch.forEach(m => {
          balancesFound.push({ date: currentDate, amount: parseInt(m[1], 10) });
        });
      }

      // 自動抓取上期結餘邏輯
      const targetStartDate = new Date(document.getElementById("startDate").value);
      let latestBalance = null;
      let latestBalanceDate = new Date(0);

      balancesFound.forEach(b => {
        const bDate = new Date(b.date);
        if (bDate < targetStartDate) {
          if (bDate >= latestBalanceDate) {
            latestBalanceDate = bDate;
            latestBalance = b.amount;
          }
        }
      });

      if (latestBalance !== null) {
        document.getElementById("balanceInput").value = latestBalance;
      }

      generateTable();
    }

    // 繪製報表表格
    function generateTable() {
      const startDate = new Date(document.getElementById("startDate").value);
      const endDate = new Date(document.getElementById("endDate").value);

      let html = "<table>";
      html += "<tr><th>日期</th><th>麵線</th><th>蛋餅</th><th>炒麵</th><th>金額</th></tr>";
      let overallTotalAmount = 0;

      for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
        let isoDate = getLocalDateString(d);
        
        if (!orders[isoDate]) {
          if (d.getDay() === 1) {
            orders[isoDate] = { isHoliday: true, noodles: 0, eggPancake: 0, friedNoodles: 0 };
          } else {
            orders[isoDate] = { isHoliday: false, noodles: 0, eggPancake: 0, friedNoodles: 0 };
          }
        }

        const month = (d.getMonth() + 1).toString().padStart(2, "0");
        const day = d.getDate().toString().padStart(2, "0");
        const weekday = weekdays[d.getDay()];
        const displayDate = `${month}/${day}/${weekday}`;
        
        let dailyTotalAmount = 0;
        let rowContent = "";

        if (orders[isoDate].isHoliday) {
          rowContent = `<td colspan="3" style="color:#888;">休假</td><td>0</td>`;
        } else {
          dailyTotalAmount =
            orders[isoDate].noodles * prices.noodles +
            orders[isoDate].eggPancake * prices.eggPancake +
            orders[isoDate].friedNoodles * prices.friedNoodles;
            
          rowContent =
            `<td>${orders[isoDate].noodles || ''}</td>` +
            `<td>${orders[isoDate].eggPancake || ''}</td>` +
            `<td>${orders[isoDate].friedNoodles || ''}</td>` +
            `<td>${dailyTotalAmount}</td>`;
        }

        overallTotalAmount += dailyTotalAmount;
        html += `<tr onclick="openModal('${isoDate}')"><td>${displayDate}</td>${rowContent}</tr>`;
      }

      html += `<tr id="overallTotalRow"><td colspan="4">總計金額:</td><td style="color:#d9534f;">${overallTotalAmount}</td></tr>`;
      html += "</table>";

      let balanceText = document.getElementById("balanceInput").value.trim();
      let advanceText = document.getElementById("advanceInput").value.trim();
      let balanceValue = (balanceText === "") ? 0 : parseFloat(balanceText);
      let advanceValue = (advanceText === "") ? 0 : parseFloat(advanceText);
      
      let balanceDisplay = (balanceText === "") ? "無" : balanceValue;
      let advanceDisplay = (advanceText === "") ? "無" : advanceValue;
      let finalBalance = (balanceValue + advanceValue) - overallTotalAmount;
      
      const startDisplay = `${(startDate.getMonth()+1).toString().padStart(2,"0")}/${startDate.getDate().toString().padStart(2,"0")}`;
      const endDisplay = `${(endDate.getMonth()+1).toString().padStart(2,"0")}/${endDate.getDate().toString().padStart(2,"0")}`;
      
      let summaryHtml = `<div id="balanceSummary" onclick="openBalanceModal()">`;
      summaryHtml += `<span>${startDisplay} 餘額：${(balanceDisplay==="無"?"無":balanceDisplay+"元")}</span><br>`;
      summaryHtml += `<span>${endDisplay} 預收：${(advanceDisplay==="無"?"無":advanceDisplay+"元")}</span><br>`;
      summaryHtml += `<span style="color:#d9534f; font-size:1.1rem;">結餘：${(balanceText === "" && advanceText === "") ? "無" : finalBalance+"元"}</span>`;
      summaryHtml += `</div><br>`;
      
      html += summaryHtml;

      document.getElementById("report").innerHTML = html;
      document.getElementById("downloadBtn").style.display = "block";
    }

    // --- Modal 操作區 (訂單微調) ---
    function openModal(isoDate) {
      currentEditDate = isoDate;
      const d = new Date(isoDate);
      const displayDate = `${(d.getMonth() + 1).toString().padStart(2, "0")}/${d.getDate().toString().padStart(2, "0")}/${weekdays[d.getDay()]}`;
      
      document.getElementById("modalDate").textContent = `修改訂單：${displayDate}`;
      document.getElementById("modalIsHoliday").checked = orders[isoDate].isHoliday;
      
      toggleModalInputs();
      
      document.getElementById("modalNoodlesQty").value = orders[isoDate].noodles;
      document.getElementById("modalEggPancakeQty").value = orders[isoDate].eggPancake;
      document.getElementById("modalFriedNoodlesQty").value = orders[isoDate].friedNoodles;
      
      document.getElementById("modalOverlay").style.display = "flex";
    }

    function toggleModalInputs() {
      const isHoliday = document.getElementById("modalIsHoliday").checked;
      document.getElementById("modalNoodlesQty").disabled = isHoliday;
      document.getElementById("modalEggPancakeQty").disabled = isHoliday;
      document.getElementById("modalFriedNoodlesQty").disabled = isHoliday;
    }

    function closeModal() {
      document.getElementById("modalOverlay").style.display = "none";
      currentEditDate = null;
    }

    function saveOrder() {
      if (!currentEditDate) return;
      const isHoliday = document.getElementById("modalIsHoliday").checked;
      orders[currentEditDate].isHoliday = isHoliday;
      
      if (isHoliday) {
        orders[currentEditDate].noodles = 0;
        orders[currentEditDate].eggPancake = 0;
        orders[currentEditDate].friedNoodles = 0;
      } else {
        orders[currentEditDate].noodles = parseInt(document.getElementById("modalNoodlesQty").value) || 0;
        orders[currentEditDate].eggPancake = parseInt(document.getElementById("modalEggPancakeQty").value) || 0;
        orders[currentEditDate].friedNoodles = parseInt(document.getElementById("modalFriedNoodlesQty").value) || 0;
      }
      generateTable();
      closeModal();
    }

    // --- Modal 操作區 (餘額/預收調整) ---
    function openBalanceModal() {
      document.getElementById("modalBalance").value = document.getElementById("balanceInput").value;
      document.getElementById("modalAdvance").value = document.getElementById("advanceInput").value;
      document.getElementById("balanceModalOverlay").style.display = "flex";
    }

    function closeBalanceModal() {
      document.getElementById("balanceModalOverlay").style.display = "none";
    }

    function saveBalance() {
      document.getElementById("balanceInput").value = document.getElementById("modalBalance").value;
      document.getElementById("advanceInput").value = document.getElementById("modalAdvance").value;
      generateTable(); 
      closeBalanceModal();
    }

    // --- 下載圖片 ---
    function downloadReport() {
      html2canvas(document.getElementById("report")).then(canvas => {
        const link = document.createElement("a");
        link.href = canvas.toDataURL("image/jpeg");
        link.download = "訂單報表.jpg";
        link.click();
      });
    }
  </script>
</body>
</html>
