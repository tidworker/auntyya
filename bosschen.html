<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>訂單報表產生器</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #ffffff;
      color: #000000;
      padding: 10px;
      margin: 0;
    }
    h1 {
      text-align: center;
      color: #000000;
    }
    form, #report {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
    }
    form div {
      margin-bottom: 12px;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-weight: bold;
      color: #333333;
    }
    input[type="date"],
    input[type="number"],
    input[type="file"] {
      padding: 6px;
      font-size: 1rem;
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #cccccc;
      border-radius: 4px;
    }
    .btn {
      width: 100%;
      max-width: 600px;
      display: block;
      margin: 15px auto;
      padding: 10px 12px;
      font-size: 1rem;
      background-color: #333333;
      color: #ffffff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    .btn:hover {
      background-color: #555555;
    }
    .btn-parse {
      background-color: #666666;
    }
    .btn-parse:hover {
      background-color: #888888;
    }
    #downloadBtn {
      background-color: #000000;
    }
    table {
      border-collapse: collapse;
      margin-top: 20px;
      width: 100%;
      text-align: center;
      font-size: 0.9rem;
    }
    table, th, td {
      border: 1px solid #666666;
      padding: 8px;
    }
    th {
      background-color: #e0e0e0;
      color: #000000;
    }
    tr:hover {
      background-color: #f5f5f5;
      cursor: pointer;
    }
    #overallTotalRow {
      background-color: #e0e0e0;
      font-weight: bold;
    }
    #balanceSummary {
      text-align: center;
      font-weight: bold;
      margin-top: 10px;
      white-space: pre-line;
      cursor: pointer;
      color: #000000;
      background-color: #f9f9f9;
      border: 1px solid #cccccc;
      padding: 10px;
      border-radius: 4px;
    }
    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
      padding: 10px;
      box-sizing: border-box;
    }
    .modal-content {
      background: #ffffff;
      padding: 20px;
      border-radius: 5px;
      width: 100%;
      max-width: 400px;
      border: 1px solid #999999;
    }
    .modal-content form div {
      margin-bottom: 10px;
    }
    .modal-btns {
      text-align: center;
      margin-top: 15px;
    }
    .modal-btns button {
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
    }
    .btn-save {
      background-color: #333333;
      color: #ffffff;
      border: none;
    }
    .btn-save:hover {
      background-color: #555555;
    }
    .btn-cancel {
      background-color: #ffffff;
      color: #333333;
      border: 1px solid #999999;
    }
    .btn-cancel:hover {
      background-color: #f0f0f0;
    }
    #loadingMsg {
      display: none;
      color: #333333;
      font-weight: bold;
      text-align: center;
      margin-top: 10px;
    }
    .upload-section {
      background: #f9f9f9;
      padding: 10px;
      border-radius: 5px;
      margin-top: 15px;
      border: 1px solid #cccccc;
    }
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
</head>
<body>
  <h1>訂單報表產生器</h1>
  <form id="reportForm">
    <div>
      <label for="startDate">開始日期:</label>
      <input type="date" id="startDate" required>
    </div>
    <div>
      <label for="endDate">結束日期:</label>
      <input type="date" id="endDate" required>
    </div>
    <div>
      <label for="balanceInput">上期結餘:</label>
      <input type="number" id="balanceInput" placeholder="無 (手動輸入優先)">
    </div>
    <div>
      <label for="advanceInput">預收金額:</label>
      <input type="number" id="advanceInput" placeholder="無">
    </div>
    
    <div class="upload-section">
      <label for="pdfFile">📄 上傳 LINE 對話紀錄 (.pdf):</label>
      <input type="file" id="pdfFile" accept=".pdf">
      <small style="color: #666666; display: block; margin-top: 4px;">※ 系統會自動將對話日期 +1 天轉為實際訂單日。</small>
      <button type="button" class="btn btn-parse" onclick="processPDF()">解析 PDF 並生成報表</button>
      <div id="loadingMsg">⏳ 正在解析 PDF 文字，請稍候...</div>
    </div>
  </form>

  <div id="report"></div>
  <button id="downloadBtn" type="button" class="btn" style="display:none;" onclick="downloadReport()">下載表格 JPG</button>

  <div id="modalOverlay" class="modal-overlay">
    <div id="modal" class="modal-content">
      <h2 id="modalDate" style="text-align: center; color: #000;"></h2>
      <form id="modalForm">
        <div>
          <label for="modalIsHoliday" style="display: inline-block;">設為休假:</label>
          <input type="checkbox" id="modalIsHoliday" onchange="toggleModalInputs()">
        </div>
        <div>
          <label for="modalNoodlesQty">麵線 (50元):</label>
          <input type="number" id="modalNoodlesQty" min="0" required>
        </div>
        <div>
          <label for="modalEggPancakeQty">蛋餅 (30元):</label>
          <input type="number" id="modalEggPancakeQty" min="0" required>
        </div>
        <div>
          <label for="modalFriedNoodlesQty">炒麵 (30元):</label>
          <input type="number" id="modalFriedNoodlesQty" min="0" required>
        </div>
        <div class="modal-btns">
          <button type="button" class="btn-save" onclick="saveOrder()">儲存修改</button>
          <button type="button" class="btn-cancel" onclick="closeModal()">取消</button>
        </div>
      </form>
    </div>
  </div>

  <div id="balanceModalOverlay" class="modal-overlay">
    <div id="balanceModal" class="modal-content">
      <h2 style="text-align: center; color: #000;">調整結餘與預收</h2>
      <form id="balanceForm">
        <div>
          <label for="modalBalance">結餘:</label>
          <input type="number" id="modalBalance" placeholder="無">
        </div>
        <div>
          <label for="modalAdvance">預收:</label>
          <input type="number" id="modalAdvance" placeholder="無">
        </div>
        <div class="modal-btns">
          <button type="button" class="btn-save" onclick="saveBalance()">儲存</button>
          <button type="button" class="btn-cancel" onclick="closeBalanceModal()">取消</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    const prices = { noodles: 50, eggPancake: 30, friedNoodles: 30 };
    let orders = {}; 
    const weekdays = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
    let currentEditDate = null;

    function getLocalDateString(date) {
      const year = date.getFullYear();
      const month = (date.getMonth() + 1).toString().padStart(2, "0");
      const day = date.getDate().toString().padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    window.addEventListener("DOMContentLoaded", function() {
      const today = new Date();
      document.getElementById("endDate").value = getLocalDateString(today);
      const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
      document.getElementById("startDate").value = getLocalDateString(firstDay);
    });

    async function processPDF() {
      const fileInput = document.getElementById('pdfFile');
      const startDateVal = document.getElementById("startDate").value;
      const endDateVal = document.getElementById("endDate").value;

      if (!startDateVal || !endDateVal) {
        alert("請確認首頁的開始與結束日期！");
        return;
      }
      if (!fileInput.files || fileInput.files.length === 0) {
        alert("請先選擇 PDF 檔案！");
        return;
      }

      document.getElementById("loadingMsg").style.display = "block";
      const file = fileInput.files[0];
      const fileReader = new FileReader();

      fileReader.onload = async function() {
        const typedarray = new Uint8Array(this.result);
        try {
          const pdf = await pdfjsLib.getDocument(typedarray).promise;
          let fullText = "";
          for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const textContent = await page.getTextContent();
            const pageText = textContent.items.map(item => item.str).join('');
            fullText += pageText;
          }
          parseTextData(fullText);
        } catch (error) {
          console.error("PDF 解析失敗:", error);
          alert("PDF 讀取失敗，請確認檔案是否損毀或加密。");
        } finally {
          document.getElementById("loadingMsg").style.display = "none";
        }
      };
      fileReader.readAsArrayBuffer(file);
    }

    function parseTextData(text) {
      const cleanText = text.replace(/\s+/g, '');
      const parts = cleanText.split(/(\d{4}\/\d{1,2}\/\d{1,2})/);

      orders = {}; 
      let balancesFound = []; 

      for (let i = 1; i < parts.length; i += 2) {
        const dateStr = parts[i];
        const contentStr = parts[i+1] || "";

        const dateMatch = dateStr.match(/(\d{4})\/(\d{1,2})\/(\d{1,2})/);
        if (!dateMatch) continue;
        
        const y = parseInt(dateMatch[1], 10);
        const m = parseInt(dateMatch[2], 10) - 1; // JS 的月份是 0~11
        const d = parseInt(dateMatch[3], 10);
        
        // **日期 +1 天邏輯** (前一天下訂單，所以實際訂單日為隔天)
        let actualOrderDate = new Date(y, m, d);
        actualOrderDate.setDate(actualOrderDate.getDate() + 1);
        
        const targetY = actualOrderDate.getFullYear();
        const targetM = (actualOrderDate.getMonth() + 1).toString().padStart(2, '0');
        const targetD = actualOrderDate.getDate().toString().padStart(2, '0');
        const currentDate = `${targetY}-${targetM}-${targetD}`;
        
        if (!orders[currentDate]) {
          orders[currentDate] = { isHoliday: false, noodles: 0, eggPancake: 0, friedNoodles: 0, hasInfo: false };
        }

        // 解析商品數量，抓取陣列的最後一個元素 (最新的一筆)
        const noodlesMatch = [...contentStr.matchAll(/麵線(\d+)/g)];
        if (noodlesMatch.length > 0) {
          orders[currentDate].noodles = parseInt(noodlesMatch[noodlesMatch.length - 1][1], 10);
          orders[currentDate].hasInfo = true;
        }

        const eggPancakeMatch = [...contentStr.matchAll(/蛋餅(\d+)/g)];
        if (eggPancakeMatch.length > 0) {
          orders[currentDate].eggPancake = parseInt(eggPancakeMatch[eggPancakeMatch.length - 1][1], 10);
          orders[currentDate].hasInfo = true;
        }

        const friedNoodlesMatch = [...contentStr.matchAll(/炒麵(\d+)/g)];
        if (friedNoodlesMatch.length > 0) {
          orders[currentDate].friedNoodles = parseInt(friedNoodlesMatch[friedNoodlesMatch.length - 1][1], 10);
          orders[currentDate].hasInfo = true;
        }

        // 解析結餘
        const balanceMatch = [...contentStr.matchAll(/結餘[:：]?(-?\d+)/g)];
        balanceMatch.forEach(m => {
          balancesFound.push({ date: currentDate, amount: parseInt(m[1], 10) });
        });
      }

      // 針對沒有抓到任何商品數量的日期，直接標記為休假
      for (let dateKey in orders) {
        if (!orders[dateKey].hasInfo) {
          orders[dateKey].isHoliday = true;
        }
      }

      // 自動抓取上期結餘邏輯
      const targetStartDate = new Date(document.getElementById("startDate").value);
      let latestBalance = null;
      let latestBalanceDate = new Date(0);

      balancesFound.forEach(b => {
        const bDate = new Date(b.date);
        if (bDate < targetStartDate) {
          if (bDate >= latestBalanceDate) {
            latestBalanceDate = bDate;
            latestBalance = b.amount;
          }
        }
      });

      let currentBalanceInput = document.getElementById("balanceInput").value.trim();
      if (latestBalance !== null && currentBalanceInput === "") {
        document.getElementById("balanceInput").value = latestBalance;
      }

      generateTable();
    }

    function generateTable() {
      const startDate = new Date(document.getElementById("startDate").value);
      const endDate = new Date(document.getElementById("endDate").value);

      let html = "<table>";
      html += "<tr><th>日期</th><th>麵線</th><th>蛋餅</th><th>炒麵</th><th>金額</th></tr>";
      let overallTotalAmount = 0;

      for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
        let isoDate = getLocalDateString(d);
        
        if (!orders[isoDate]) {
          orders[isoDate] = { isHoliday: true, noodles: 0, eggPancake: 0, friedNoodles: 0 };
        }

        const month = (d.getMonth() + 1).toString().padStart(2, "0");
        const day = d.getDate().toString().padStart(2, "0");
        const weekday = weekdays[d.getDay()];
        const displayDate = `${month}/${day}/${weekday}`;
        
        let dailyTotalAmount = 0;
        let rowContent = "";

        if (orders[isoDate].isHoliday) {
          rowContent = `<td colspan="3" style="color:#999999;">休假</td><td>0</td>`;
        } else {
          dailyTotalAmount =
            orders[isoDate].noodles * prices.noodles +
            orders[isoDate].eggPancake * prices.eggPancake +
            orders[isoDate].friedNoodles * prices.friedNoodles;
            
          rowContent =
            `<td>${orders[isoDate].noodles || ''}</td>` +
            `<td>${orders[isoDate].eggPancake || ''}</td>` +
            `<td>${orders[isoDate].friedNoodles || ''}</td>` +
            `<td style="font-weight:bold;">${dailyTotalAmount}</td>`;
        }

        overallTotalAmount += dailyTotalAmount;
        html += `<tr onclick="openModal('${isoDate}')"><td>${displayDate}</td>${rowContent}</tr>`;
      }

      html += `<tr id="overallTotalRow"><td colspan="4">總計金額:</td><td>${overallTotalAmount}</td></tr>`;
      html += "</table>";

      let balanceText = document.getElementById("balanceInput").value.trim();
      let advanceText = document.getElementById("advanceInput").value.trim();
      let balanceValue = (balanceText === "") ? 0 : parseFloat(balanceText);
      let advanceValue = (advanceText === "") ? 0 : parseFloat(advanceText);
      
      let balanceDisplay = (balanceText === "") ? "無" : balanceValue;
      let advanceDisplay = (advanceText === "") ? "無" : advanceValue;
      let finalBalance = (balanceValue + advanceValue) - overallTotalAmount;
      
      const startDisplay = `${(startDate.getMonth()+1).toString().padStart(2,"0")}/${startDate.getDate().toString().padStart(2,"0")}`;
      const endDisplay = `${(endDate.getMonth()+1).toString().padStart(2,"0")}/${endDate.getDate().toString().padStart(2,"0")}`;
      
      let summaryHtml = `<div id="balanceSummary" onclick="openBalanceModal()">`;
      summaryHtml += `<span>${startDisplay} 結餘：${(balanceDisplay==="無"?"無":balanceDisplay+"元")}</span><br>`;
      summaryHtml += `<span>${endDisplay} 預收：${(advanceDisplay==="無"?"無":advanceDisplay+"元")}</span><br>`;
      summaryHtml += `<span style="font-size:1.1rem; font-weight:bold; color:#000;">結餘：${(balanceText === "" && advanceText === "") ? "無" : finalBalance+"元"}</span>`;
      summaryHtml += `</div><br>`;
      
      html += summaryHtml;

      document.getElementById("report").innerHTML = html;
      document.getElementById("downloadBtn").style.display = "block";
    }

    function openModal(isoDate) {
      currentEditDate = isoDate;
      const d = new Date(isoDate);
      const displayDate = `${(d.getMonth() + 1).toString().padStart(2, "0")}/${d.getDate().toString().padStart(2, "0")}/${weekdays[d.getDay()]}`;
      
      document.getElementById("modalDate").textContent = `修改訂單：${displayDate}`;
      document.getElementById("modalIsHoliday").checked = orders[isoDate].isHoliday;
      
      toggleModalInputs();
      
      document.getElementById("modalNoodlesQty").value = orders[isoDate].noodles;
      document.getElementById("modalEggPancakeQty").value = orders[isoDate].eggPancake;
      document.getElementById("modalFriedNoodlesQty").value = orders[isoDate].friedNoodles;
      
      document.getElementById("modalOverlay").style.display = "flex";
    }

    function toggleModalInputs() {
      const isHoliday = document.getElementById("modalIsHoliday").checked;
      document.getElementById("modalNoodlesQty").disabled = isHoliday;
      document.getElementById("modalEggPancakeQty").disabled = isHoliday;
      document.getElementById("modalFriedNoodlesQty").disabled = isHoliday;
    }

    function closeModal() {
      document.getElementById("modalOverlay").style.display = "none";
      currentEditDate = null;
    }

    function saveOrder() {
      if (!currentEditDate) return;
      const isHoliday = document.getElementById("modalIsHoliday").checked;
      
      if (!orders[currentEditDate]) {
        orders[currentEditDate] = {};
      }
      
      orders[currentEditDate].isHoliday = isHoliday;
      
      if (isHoliday) {
        orders[currentEditDate].noodles = 0;
        orders[currentEditDate].eggPancake = 0;
        orders[currentEditDate].friedNoodles = 0;
      } else {
        orders[currentEditDate].noodles = parseInt(document.getElementById("modalNoodlesQty").value) || 0;
        orders[currentEditDate].eggPancake = parseInt(document.getElementById("modalEggPancakeQty").value) || 0;
        orders[currentEditDate].friedNoodles = parseInt(document.getElementById("modalFriedNoodlesQty").value) || 0;
      }
      generateTable();
      closeModal();
    }

    function openBalanceModal() {
      document.getElementById("modalBalance").value = document.getElementById("balanceInput").value;
      document.getElementById("modalAdvance").value = document.getElementById("advanceInput").value;
      document.getElementById("balanceModalOverlay").style.display = "flex";
    }

    function closeBalanceModal() {
      document.getElementById("balanceModalOverlay").style.display = "none";
    }

    function saveBalance() {
      document.getElementById("balanceInput").value = document.getElementById("modalBalance").value;
      document.getElementById("advanceInput").value = document.getElementById("modalAdvance").value;
      generateTable(); 
      closeBalanceModal();
    }

    function downloadReport() {
      html2canvas(document.getElementById("report")).then(canvas => {
        const link = document.createElement("a");
        link.href = canvas.toDataURL("image/jpeg");
        link.download = "訂單報表.jpg";
        link.click();
      });
    }
  </script>
</body>
</html>
