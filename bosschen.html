<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>訂單報表產生器</title>
  <style>
    body {
      font-family: sans-serif;
      background-color: #ffffff;
      color: #000000;
      padding: 8px;
      margin: 0;
    }
    h2 {
      text-align: center;
      margin-top: 10px;
      margin-bottom: 15px;
    }
    .nav-bar {
      display: flex;
      margin-bottom: 15px;
      border-bottom: 2px solid #000000;
    }
    .nav-btn {
      flex: 1;
      padding: 10px;
      background-color: #e0e0e0;
      color: #000000;
      border: 1px solid #000000;
      border-bottom: none;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      text-align: center;
      margin: 0;
    }
    .nav-btn:first-child {
      border-right: none;
    }
    .nav-btn.active {
      background-color: #333333;
      color: #ffffff;
    }
    .page-section {
      display: none;
    }
    .page-section.active {
      display: block;
    }
    div.form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-weight: bold;
      font-size: 0.9rem;
      margin-bottom: 4px;
    }
    input[type="date"], input[type="number"], textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      border: 1px solid #000000;
      font-size: 1rem;
    }
    .flex-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }
    button.action-btn {
      flex: 1;
      padding: 10px;
      margin: 0;
      background-color: #e0e0e0;
      color: #000000;
      border: 1px solid #000000;
      font-weight: bold;
      cursor: pointer;
      font-size: 1rem;
    }
    button.action-btn:hover {
      background-color: #cccccc;
    }
    button.dark-btn {
      background-color: #333333;
      color: #ffffff;
    }
    button.dark-btn:hover {
      background-color: #555555;
    }
    button.full-btn {
      width: 100%;
      margin-bottom: 10px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 10px;
      text-align: center;
      font-size: 0.9rem;
    }
    th, td {
      border: 1px solid #000000;
      padding: 6px;
    }
    th {
      background-color: #cccccc;
    }
    tr:hover {
      background-color: #eeeeee;
      cursor: pointer;
    }
    .summary {
      border: 1px solid #000000;
      padding: 10px;
      margin-top: 15px;
      text-align: center;
      font-weight: bold;
      background-color: #f0f0f0;
      line-height: 1.6;
    }
    .overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
    }
    .modal {
      background: #ffffff;
      border: 2px solid #000000;
      padding: 16px;
      margin: 10% auto;
      width: 90%;
      max-width: 350px;
    }
    .modal-title {
      margin-top: 0;
      border-bottom: 1px solid #000000;
      padding-bottom: 6px;
      margin-bottom: 10px;
    }
    #weekContainer {
      border: 1px solid #000000;
      padding: 8px;
      margin-top: 15px;
      background-color: #f9f9f9;
    }
    .week-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-weight: bold;
    }
    .week-nav button {
      padding: 4px 12px;
      background-color: #e0e0e0;
      border: 1px solid #000;
      cursor: pointer;
      font-weight: bold;
    }
    .today-row {
      background-color: #dddddd;
      font-weight: bold;
    }
    .future-row {
      color: #aaaaaa;
    }
  </style>
</head>
<body>
  <h2>訂單系統</h2>

  <div class="nav-bar">
    <button id="navInput" class="nav-btn active" onclick="switchTab('input')">輸入資料</button>
    <button id="navReport" class="nav-btn" onclick="switchTab('report')">報表管理</button>
  </div>

  <div id="pageInput" class="page-section active">
    <div class="form-group">
      <label>訂單日期 (已自動處理前一天下單邏輯):</label>
      <input type="date" id="dailyDate">
    </div>
    <div class="form-group">
      <label>對話內容 (可貼多筆):</label>
      <textarea id="dailyText" rows="6" placeholder="在此貼上單日對話..."></textarea>
    </div>
    <div class="flex-row">
      <button type="button" class="action-btn" onclick="pasteText()">一鍵貼上</button>
      <button type="button" class="action-btn dark-btn" onclick="parseDailyText()">解析儲存</button>
    </div>
    
    <div id="weekContainer">
      <div class="week-nav">
        <button type="button" onclick="changeWeek(-1)">上周</button>
        <span>本周紀錄 (可點選修改)</span>
        <button type="button" onclick="changeWeek(1)">下周</button>
      </div>
      <div id="weekTableWrapper"></div>
    </div>
  </div>

  <div id="pageReport" class="page-section">
    <div class="form-group">
      <label>開始日期:</label>
      <input type="date" id="startDate" onchange="generateTable()">
    </div>
    <div class="form-group">
      <label>結束日期:</label>
      <input type="date" id="endDate" onchange="generateTable()">
    </div>
    
    <button type="button" class="action-btn full-btn" onclick="generateTable()">更新報表資料</button>

    <div id="reportContainer"></div>
    
    <div id="actionBtnContainer" class="flex-row" style="display:none; margin-top:10px;">
      <button type="button" class="action-btn" id="copyBtn" onclick="copySummaryText()">複製文字訊息</button>
      <button type="button" class="action-btn dark-btn" onclick="downloadReport()">下載灰階報表</button>
    </div>
  </div>

  <div id="modalOverlay" class="overlay">
    <div class="modal">
      <h3 id="modalDate" class="modal-title"></h3>
      <div class="form-group">
        <label><input type="checkbox" id="modalIsHoliday" onchange="toggleModalInputs()"> 設為休假</label>
      </div>
      <div class="form-group">
        <label>麵線 (50元):</label>
        <input type="number" id="modalNoodlesQty" min="0">
      </div>
      <div class="form-group">
        <label>蛋餅 (30元):</label>
        <input type="number" id="modalEggPancakeQty" min="0">
      </div>
      <div class="form-group">
        <label>炒麵 (30元):</label>
        <input type="number" id="modalFriedNoodlesQty" min="0">
      </div>
      <div class="form-group" style="border-top: 1px dashed #000; padding-top: 10px; margin-top: 10px;">
        <label>預收金額:</label>
        <input type="number" id="modalAdvanceQty" placeholder="無">
      </div>
      <div class="flex-row" style="margin-top: 15px;">
        <button type="button" class="action-btn dark-btn" onclick="saveOrder()">確認儲存</button>
        <button type="button" class="action-btn" onclick="closeModal()">取消修改</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    var prices = { noodles: 50, eggPancake: 30, friedNoodles: 30 };
    var orders = {};
    var balances = {};
    var advances = {};
    var weekdays = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
    var currentEditDate = null;
    var storageKey = "orderSystemData_v16";
    var currentWeekStart = new Date();

    function switchTab(tabName) {
      document.getElementById('pageInput').classList.remove('active');
      document.getElementById('pageReport').classList.remove('active');
      document.getElementById('navInput').classList.remove('active');
      document.getElementById('navReport').classList.remove('active');

      if (tabName === 'input') {
        document.getElementById('pageInput').classList.add('active');
        document.getElementById('navInput').classList.add('active');
        renderWeekView();
      } else if (tabName === 'report') {
        document.getElementById('pageReport').classList.add('active');
        document.getElementById('navReport').classList.add('active');
        generateTable();
      }
    }

    function getLocalDateString(date) {
      var year = date.getFullYear();
      var month = (date.getMonth() + 1).toString();
      var day = date.getDate().toString();
      if (month.length < 2) month = '0' + month;
      if (day.length < 2) day = '0' + day;
      return year + '-' + month + '-' + day;
    }

    function initLocalStorage() {
      var savedData = localStorage.getItem(storageKey);
      if (!savedData) {
        orders['2026-06-14'] = { noodles: 25, eggPancake: 30, friedNoodles: 50, isHoliday: false, hasInfo: true };
        orders['2026-06-15'] = { noodles: 0, eggPancake: 0, friedNoodles: 0, isHoliday: true, hasInfo: true };
        balances['2026-06-13'] = 17720;
        advances = {};
        saveDataToLocal();
      } else {
        var parsed = JSON.parse(savedData);
        orders = parsed.orders || {};
        balances = parsed.balances || {};
        advances = parsed.advances || {};
      }
    }

    function saveDataToLocal() {
      var dataObj = { orders: orders, balances: balances, advances: advances };
      localStorage.setItem(storageKey, JSON.stringify(dataObj));
    }

    async function pasteText() {
      try {
        var text = await navigator.clipboard.readText();
        var dailyTextElem = document.getElementById("dailyText");
        var existingText = dailyTextElem.value;
        if (existingText.trim() !== "") {
          dailyTextElem.value = existingText + "\n\n" + text;
        } else {
          dailyTextElem.value = text;
        }
      } catch (err) {
        alert("無法自動讀取剪貼簿，請手動長按輸入框並選擇貼上。");
      }
    }

    function initWeekView() {
      var today = new Date();
      var day = today.getDay();
      var diff = today.getDate() - day + (day === 0 ? -6 : 1); 
      currentWeekStart = new Date(today.setDate(diff));
      renderWeekView();
    }

    function renderWeekView() {
      var todayStr = getLocalDateString(new Date());
      var html = "<table><tr><th>日期</th><th>麵線</th><th>蛋餅</th><th>炒麵</th><th>金額</th></tr>";
      var weekTotalAmount = 0;

      for (var i = 0; i < 7; i++) {
        var d = new Date(currentWeekStart);
        d.setDate(d.getDate() + i);
        var dateStr = getLocalDateString(d);
        
        var month = (d.getMonth() + 1).toString();
        var day = d.getDate().toString();
        var weekday = weekdays[d.getDay()];
        if (month.length < 2) month = '0' + month;
        if (day.length < 2) day = '0' + day;
        var displayDate = month + '/' + day + '(' + weekday + ')';
        
        var isToday = (dateStr === todayStr);
        var isFuture = (dateStr > todayStr);
        
        var trClass = "";
        if (isToday) trClass = " class='today-row'";
        else if (isFuture) trClass = " class='future-row'";
        
        var dailyTotalAmount = 0;
        var rowContent = "";
        var hasData = orders[dateStr] && orders[dateStr].hasInfo && !orders[dateStr].isHoliday;

        if (dateStr < "2026-06-14") {
          rowContent = "<td colspan='3'>-</td><td>0</td>";
        } else if (isFuture && !hasData) {
          rowContent = "<td colspan='3'>空白</td><td>0</td>";
        } else if (isToday && !hasData) {
          rowContent = "<td colspan='3'>Today</td><td>0</td>";
        } else if (!orders[dateStr] || !orders[dateStr].hasInfo || orders[dateStr].isHoliday) {
          rowContent = "<td colspan='3' style='color:#666;'>休假</td><td>0</td>";
        } else {
          dailyTotalAmount =
            (orders[dateStr].noodles * prices.noodles) +
            (orders[dateStr].eggPancake * prices.eggPancake) +
            (orders[dateStr].friedNoodles * prices.friedNoodles);
            
          rowContent =
            "<td>" + (orders[dateStr].noodles || '0') + "</td>" +
            "<td>" + (orders[dateStr].eggPancake || '0') + "</td>" +
            "<td>" + (orders[dateStr].friedNoodles || '0') + "</td>" +
            "<td style='font-weight:bold;'>" + dailyTotalAmount + "</td>";
        }

        weekTotalAmount += dailyTotalAmount;
        html += "<tr" + trClass + " onclick=\"openModal('" + dateStr + "')\"><td>" + displayDate + "</td>" + rowContent + "</tr>";
      }

      html += "<tr style='background:#e0e0e0; font-weight:bold; color:#000;'><td colspan='4'>本周統計</td><td>" + weekTotalAmount + "</td></tr>";
      html += "</table>";
      document.getElementById("weekTableWrapper").innerHTML = html;
    }

    function changeWeek(offset) {
      currentWeekStart.setDate(currentWeekStart.getDate() + (offset * 7));
      renderWeekView();
    }

    window.addEventListener("DOMContentLoaded", function() {
      initLocalStorage();
      
      var savedStartDate = localStorage.getItem(storageKey + "_startDate");
      if (savedStartDate) {
        document.getElementById("startDate").value = savedStartDate;
      } else {
        document.getElementById("startDate").value = "2026-06-14";
      }
      
      var todayStr = getLocalDateString(new Date());
      document.getElementById("endDate").value = todayStr;
      document.getElementById("dailyDate").value = todayStr;
      
      initWeekView();
      generateTable();
    });

    function getSumOfMatches(text, regex) {
      var match;
      var sum = 0;
      var found = false;
      while ((match = regex.exec(text)) !== null) {
        sum += parseInt(match[1], 10);
        found = true;
      }
      return found ? sum : null;
    }

    function getLastMatchNumber(text, regex) {
      var match;
      var lastNum = null;
      while ((match = regex.exec(text)) !== null) {
        lastNum = parseInt(match[1], 10);
      }
      return lastNum;
    }

    function parseDailyText() {
      var targetDateStr = document.getElementById("dailyDate").value;
      var rawText = document.getElementById("dailyText").value;
      
      if (!targetDateStr) {
        alert("請選擇訂單日期");
        return;
      }
      if (!rawText.trim()) {
        alert("請輸入或貼上對話內容");
        return;
      }

      var text = rawText.replace(/\s+/g, '');
      var isHoliday = text.indexOf("休假") !== -1;

      var nSum = getSumOfMatches(text, /麵線(\d{1,2})/g);
      var eSum = getSumOfMatches(text, /蛋餅(\d{1,2})/g);
      var fSum = getSumOfMatches(text, /炒麵(\d{1,2})/g);
      var advMatch = getLastMatchNumber(text, /預收[:：]?(-?\d+)/g);

      var itemMatched = (nSum !== null || eSum !== null || fSum !== null);

      if (!itemMatched && advMatch === null && !isHoliday) {
        alert("未能解析到任何商品、預收或休假資料，原有數據維持不變。");
        return;
      }

      if (!orders[targetDateStr]) {
        orders[targetDateStr] = { isHoliday: false, noodles: 0, eggPancake: 0, friedNoodles: 0, hasInfo: false };
      }

      if (nSum !== null) orders[targetDateStr].noodles = nSum;
      if (eSum !== null) orders[targetDateStr].eggPancake = eSum;
      if (fSum !== null) orders[targetDateStr].friedNoodles = fSum;

      if (isHoliday) {
        orders[targetDateStr].isHoliday = true;
        orders[targetDateStr].noodles = 0;
        orders[targetDateStr].eggPancake = 0;
        orders[targetDateStr].friedNoodles = 0;
        orders[targetDateStr].hasInfo = true;
      } else if (itemMatched) {
        orders[targetDateStr].isHoliday = false;
        orders[targetDateStr].hasInfo = true;
      }

      var bMatch = getLastMatchNumber(text, /結餘[:：]?(-?\d+)/g);
      if (bMatch !== null) {
        var d = new Date(targetDateStr);
        d.setDate(d.getDate() - 1);
        var prevDayStr = getLocalDateString(d);
        balances[prevDayStr] = bMatch;
      }

      if (advMatch !== null) {
        advances[targetDateStr] = advMatch;
        orders[targetDateStr].hasInfo = true;
      }

      saveDataToLocal();
      document.getElementById("dailyText").value = "";
      alert("資料已解析並儲存");
      renderWeekView(); 
    }

    function calculateBalanceAt(targetDateStr) {
      var baseDateStr = "2026-06-13";
      var baseBalance = balances[baseDateStr] || 0;
      var bDate = new Date(baseDateStr);
      bDate.setDate(bDate.getDate() + 1); 
      var end = new Date(targetDateStr);
      var runningBalance = baseBalance;

      while (bDate < end) {
        var currStr = getLocalDateString(bDate);
        if (advances[currStr]) {
          runningBalance += advances[currStr];
        }
        if (orders[currStr] && !orders[currStr].isHoliday && orders[currStr].hasInfo) {
          var cons = (orders[currStr].noodles * prices.noodles) +
                     (orders[currStr].eggPancake * prices.eggPancake) +
                     (orders[currStr].friedNoodles * prices.friedNoodles);
          runningBalance -= cons;
        }
        bDate.setDate(bDate.getDate() + 1);
      }
      return runningBalance;
    }

    function generateTable() {
      var startDateStr = document.getElementById("startDate").value;
      var userEndDateStr = document.getElementById("endDate").value;
      if (!startDateStr || !userEndDateStr) return;

      localStorage.setItem(storageKey + "_startDate", startDateStr);

      var startDate = new Date(startDateStr);
      var userEndDate = new Date(userEndDateStr);
      var endDate = new Date(userEndDateStr);

      if (startDate >= userEndDate) {
        endDate = new Date(startDate);
        endDate.setDate(endDate.getDate() + 2);
        document.getElementById("endDate").value = getLocalDateString(endDate);
      } else {
        var maxDataDateStr = startDateStr;
        for (var key in orders) {
          if (orders[key].hasInfo && key > maxDataDateStr) {
            maxDataDateStr = key;
          }
        }
        var maxDataDate = new Date(maxDataDateStr);
        if (maxDataDate < endDate) {
          endDate = maxDataDate;
        }
      }
      
      var todayStr = getLocalDateString(new Date());
      var balanceValue = calculateBalanceAt(startDateStr);

      var latestAdvance = 0;
      var latestAdvanceDate = new Date(0);
      for (var advKey in advances) {
        var aDate = new Date(advKey);
        if (aDate <= endDate && aDate >= startDate) {
          if (aDate >= latestAdvanceDate) {
            latestAdvanceDate = aDate;
            latestAdvance = advances[advKey];
          }
        }
      }
      var advanceValue = latestAdvance;

      var html = "<table id='reportTable'>";
      html += "<tr><th>日期</th><th>麵線</th><th>蛋餅</th><th>炒麵</th><th>金額</th></tr>";
      var overallTotalAmount = 0;

      for (var d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
        var isoDate = getLocalDateString(d);
        var month = (d.getMonth() + 1).toString();
        var day = d.getDate().toString();
        var weekday = weekdays[d.getDay()];
        if (month.length < 2) month = '0' + month;
        if (day.length < 2) day = '0' + day;
        var displayDate = month + '/' + day + '(' + weekday + ')';
        
        var isToday = (isoDate === todayStr);
        var isFuture = (isoDate > todayStr);
        
        var trClass = "";
        if (isToday) trClass = " class='today-row'";
        else if (isFuture) trClass = " class='future-row'";

        var dailyTotalAmount = 0;
        var rowContent = "";
        var hasData = orders[isoDate] && orders[isoDate].hasInfo && !orders[isoDate].isHoliday;

        if (isoDate < "2026-06-14") {
          rowContent = "<td colspan='3'>-</td><td>0</td>";
        } else if (isFuture && !hasData) {
          rowContent = "<td colspan='3'>空白</td><td>0</td>";
        } else if (isToday && !hasData) {
          rowContent = "<td colspan='3'>Today</td><td>0</td>";
        } else if (!orders[isoDate] || !orders[isoDate].hasInfo || orders[isoDate].isHoliday) {
          rowContent = "<td colspan='3' style='color:#666;'>休假</td><td>0</td>";
        } else {
          dailyTotalAmount =
            (orders[isoDate].noodles * prices.noodles) +
            (orders[isoDate].eggPancake * prices.eggPancake) +
            (orders[isoDate].friedNoodles * prices.friedNoodles);
            
          rowContent =
            "<td>" + (orders[isoDate].noodles || '0') + "</td>" +
            "<td>" + (orders[isoDate].eggPancake || '0') + "</td>" +
            "<td>" + (orders[isoDate].friedNoodles || '0') + "</td>" +
            "<td style='font-weight:bold; color:#000;'>" + dailyTotalAmount + "</td>";
        }

        overallTotalAmount += dailyTotalAmount;
        html += "<tr" + trClass + " onclick=\"openModal('" + isoDate + "')\"><td>" + displayDate + "</td>" + rowContent + "</tr>";
      }

      html += "<tr style='background:#ccc; font-weight:bold; color:#000;'><td colspan='4'>本期消費總計</td><td>" + overallTotalAmount + "</td></tr>";
      html += "</table>";
      
      var sM = (startDate.getMonth() + 1).toString();
      var sD = startDate.getDate().toString();
      if (sM.length < 2) sM = '0' + sM;
      if (sD.length < 2) sD = '0' + sD;
      var startDateDisplay = sM + "/" + sD;
      
      var eM = (endDate.getMonth() + 1).toString();
      var eD = endDate.getDate().toString();
      if (eM.length < 2) eM = '0' + eM;
      if (eD.length < 2) eD = '0' + eD;
      
      var periodStr = "結算區間: " + sM + "/" + sD + " ~ " + eM + "/" + eD;

      var advDateDisplay = "本期";
      if (latestAdvanceDate.getTime() > 0 && advanceValue !== 0) {
        var advM = (latestAdvanceDate.getMonth() + 1).toString();
        var advD = latestAdvanceDate.getDate().toString();
        if (advM.length < 2) advM = '0' + advM;
        if (advD.length < 2) advD = '0' + advD;
        advDateDisplay = advM + "/" + advD;
      }
      var advanceDisplay = advanceValue.toString();
      
      var finalBalance = (balanceValue + advanceValue) - overallTotalAmount;
      
      var summaryHtml = "<div class='summary'>";
      summaryHtml += startDateDisplay + " 結餘: " + balanceValue + " ＋ " + advDateDisplay + " 預收: " + advanceDisplay + "<br>";
      summaryHtml += "扣除本期消費: " + overallTotalAmount + "<br>";
      summaryHtml += "<span style='font-size:1.2em; color:#000;'>最終結餘: " + finalBalance + "</span><br>";
      summaryHtml += "<span style='font-size:0.85em; color:#666; font-weight:normal;'>" + periodStr + "</span>";
      summaryHtml += "</div>";
      
      html += summaryHtml;

      document.getElementById("reportContainer").innerHTML = html;
      
      var tDate = new Date();
      var tM = (tDate.getMonth() + 1).toString().padStart(2, '0');
      var tD = tDate.getDate().toString().padStart(2, '0');
      
      var plainTextSummary = tM + "/" + tD + "\n" +
                             "預收" + advanceDisplay + "\n" +
                             "結餘" + finalBalance + "\n" +
                             "感謝";
      document.getElementById("copyBtn").setAttribute("data-summary", plainTextSummary);
      
      document.getElementById("actionBtnContainer").style.display = "flex";
    }

    function copySummaryText() {
      var btn = document.getElementById("copyBtn");
      var baseText = btn.getAttribute("data-summary");
      if (!baseText) return;
      
      navigator.clipboard.writeText(baseText).then(function() {
        alert("已複製結算訊息");
      }).catch(function() {
        alert("複製失敗，請手動複製");
      });
    }

    function openModal(isoDate) {
      currentEditDate = isoDate;
      var d = new Date(isoDate);
      var displayDate = (d.getMonth() + 1) + '/' + d.getDate() + '(' + weekdays[d.getDay()] + ')';
      
      document.getElementById("modalDate").textContent = "修改: " + displayDate;
      
      if (!orders[isoDate]) {
        document.getElementById("modalIsHoliday").checked = false;
        document.getElementById("modalNoodlesQty").value = 0;
        document.getElementById("modalEggPancakeQty").value = 0;
        document.getElementById("modalFriedNoodlesQty").value = 0;
      } else {
        document.getElementById("modalIsHoliday").checked = orders[isoDate].isHoliday;
        document.getElementById("modalNoodlesQty").value = orders[isoDate].noodles || 0;
        document.getElementById("modalEggPancakeQty").value = orders[isoDate].eggPancake || 0;
        document.getElementById("modalFriedNoodlesQty").value = orders[isoDate].friedNoodles || 0;
      }
      
      document.getElementById("modalAdvanceQty").value = advances[isoDate] || "";
      
      toggleModalInputs();
      document.getElementById("modalOverlay").style.display = "block";
    }

    function toggleModalInputs() {
      var isHoliday = document.getElementById("modalIsHoliday").checked;
      document.getElementById("modalNoodlesQty").disabled = isHoliday;
      document.getElementById("modalEggPancakeQty").disabled = isHoliday;
      document.getElementById("modalFriedNoodlesQty").disabled = isHoliday;
    }

    function closeModal() {
      document.getElementById("modalOverlay").style.display = "none";
      currentEditDate = null;
    }

    function saveOrder() {
      if (!currentEditDate) return;
      var isHoliday = document.getElementById("modalIsHoliday").checked;
      
      if (!orders[currentEditDate]) {
        orders[currentEditDate] = {};
      }
      
      orders[currentEditDate].isHoliday = isHoliday;
      
      if (isHoliday) {
        orders[currentEditDate].noodles = 0;
        orders[currentEditDate].eggPancake = 0;
        orders[currentEditDate].friedNoodles = 0;
      } else {
        orders[currentEditDate].noodles = parseInt(document.getElementById("modalNoodlesQty").value) || 0;
        orders[currentEditDate].eggPancake = parseInt(document.getElementById("modalEggPancakeQty").value) || 0;
        orders[currentEditDate].friedNoodles = parseInt(document.getElementById("modalFriedNoodlesQty").value) || 0;
      }
      
      var advInput = document.getElementById("modalAdvanceQty").value;
      if (advInput !== "") {
        advances[currentEditDate] = parseInt(advInput, 10);
      } else {
        delete advances[currentEditDate];
      }
      
      if (orders[currentEditDate].noodles > 0 || orders[currentEditDate].eggPancake > 0 || orders[currentEditDate].friedNoodles > 0 || isHoliday || advInput !== "") {
        orders[currentEditDate].hasInfo = true;
      } else {
        orders[currentEditDate].hasInfo = false;
      }
      
      saveDataToLocal();
      generateTable();
      renderWeekView();
      closeModal();
    }

    function downloadReport() {
      var reportDiv = document.getElementById("reportContainer");
      html2canvas(reportDiv).then(function(canvas) {
        var ctx = canvas.getContext("2d");
        var imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        var data = imgData.data;
        
        for (var i = 0; i < data.length; i += 4) {
          var gray = data[i] * 0.3 + data[i+1] * 0.59 + data[i+2] * 0.11;
          data[i] = gray;
          data[i+1] = gray;
          data[i+2] = gray;
        }
        ctx.putImageData(imgData, 0, 0);

        var link = document.createElement("a");
        link.href = canvas.toDataURL("image/jpeg", 0.6);
        link.download = "report.jpg";
        link.click();
      });
    }
  </script>
</body>
</html>
