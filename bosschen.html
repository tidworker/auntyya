<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>訂單報表產生器</title>
  <style>
    body {
      font-family: sans-serif;
      background-color: #ffffff;
      color: #000000;
      padding: 8px;
      margin: 0;
    }
    div {
      margin-bottom: 8px;
    }
    label {
      display: block;
      font-weight: bold;
    }
    input[type="date"], input[type="number"], input[type="file"] {
      width: 100%;
      box-sizing: border-box;
      padding: 4px;
      border: 1px solid #000000;
    }
    button {
      width: 100%;
      padding: 8px;
      margin: 8px 0;
      background-color: #e0e0e0;
      color: #000000;
      border: 1px solid #000000;
      font-weight: bold;
      cursor: pointer;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 10px;
      text-align: center;
    }
    th, td {
      border: 1px solid #000000;
      padding: 4px;
    }
    th {
      background-color: #cccccc;
    }
    .overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
    }
    .modal {
      background: #ffffff;
      border: 2px solid #000000;
      padding: 16px;
      margin: 10% auto;
      width: 90%;
      max-width: 300px;
    }
    #loadingMsg {
      display: none;
      font-weight: bold;
      text-align: center;
    }
    .summary {
      border: 1px solid #000000;
      padding: 8px;
      margin-top: 10px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h2>訂單報表產生器</h2>
  
  <div>
    <label>開始日期:</label>
    <input type="date" id="startDate">
  </div>
  <div>
    <label>結束日期:</label>
    <input type="date" id="endDate">
  </div>
  <div>
    <label>上期結餘:</label>
    <input type="number" id="balanceInput" placeholder="空白將自動抓取">
  </div>
  <div>
    <label>預收金額:</label>
    <input type="number" id="advanceInput">
  </div>
  <div style="border: 1px solid #000; padding: 8px; background: #f0f0f0;">
    <label>上傳對話紀錄 (.pdf):</label>
    <input type="file" id="pdfFile" accept=".pdf">
    <button type="button" onclick="processPDF()">解析檔案</button>
    <div id="loadingMsg">系統處理中，請稍候...</div>
  </div>

  <div id="report"></div>
  <button id="downloadBtn" type="button" style="display:none;" onclick="downloadReport()">下載灰階報表</button>

  <div id="modalOverlay" class="overlay">
    <div class="modal">
      <h3 id="modalDate" style="margin-top:0;"></h3>
      <div>
        <label><input type="checkbox" id="modalIsHoliday" onchange="toggleModalInputs()"> 設為休假</label>
      </div>
      <div>
        <label>麵線 (50元):</label>
        <input type="number" id="modalNoodlesQty" min="0">
      </div>
      <div>
        <label>蛋餅 (30元):</label>
        <input type="number" id="modalEggPancakeQty" min="0">
      </div>
      <div>
        <label>炒麵 (30元):</label>
        <input type="number" id="modalFriedNoodlesQty" min="0">
      </div>
      <button type="button" onclick="saveOrder()">儲存</button>
      <button type="button" onclick="closeModal()">取消</button>
    </div>
  </div>

  <div id="balanceModalOverlay" class="overlay">
    <div class="modal">
      <h3 style="margin-top:0;">調整結餘與預收</h3>
      <div>
        <label>結餘:</label>
        <input type="number" id="modalBalance">
      </div>
      <div>
        <label>預收:</label>
        <input type="number" id="modalAdvance">
      </div>
      <button type="button" onclick="saveBalance()">儲存</button>
      <button type="button" onclick="closeBalanceModal()">取消</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    var prices = { noodles: 50, eggPancake: 30, friedNoodles: 30 };
    var orders = {};
    var weekdays = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
    var currentEditDate = null;

    function getLocalDateString(date) {
      var year = date.getFullYear();
      var month = (date.getMonth() + 1).toString();
      var day = date.getDate().toString();
      if (month.length < 2) month = '0' + month;
      if (day.length < 2) day = '0' + day;
      return year + '-' + month + '-' + day;
    }

    window.addEventListener("DOMContentLoaded", function() {
      var today = new Date();
      document.getElementById("endDate").value = getLocalDateString(today);
      var firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
      document.getElementById("startDate").value = getLocalDateString(firstDay);
    });

    async function processPDF() {
      var fileInput = document.getElementById('pdfFile');
      var startDateVal = document.getElementById("startDate").value;
      var endDateVal = document.getElementById("endDate").value;

      if (!startDateVal || !endDateVal) {
        alert("請確認開始與結束日期");
        return;
      }
      if (!fileInput.files || fileInput.files.length === 0) {
        alert("請選擇 PDF 檔案");
        return;
      }

      document.getElementById("loadingMsg").style.display = "block";
      var file = fileInput.files[0];
      var fileReader = new FileReader();

      fileReader.onload = async function() {
        var typedarray = new Uint8Array(this.result);
        try {
          var pdf = await pdfjsLib.getDocument(typedarray).promise;
          var fullText = "";
          for (var i = 1; i <= pdf.numPages; i++) {
            var page = await pdf.getPage(i);
            var textContent = await page.getTextContent();
            var pageText = textContent.items.map(function(item) { return item.str; }).join('');
            fullText += pageText;
          }
          parseTextData(fullText);
        } catch (error) {
          alert("檔案解析失敗");
        } finally {
          document.getElementById("loadingMsg").style.display = "none";
        }
      };
      fileReader.readAsArrayBuffer(file);
    }

    // 解決舊版瀏覽器不支援 matchAll 的問題
    function getLastMatchNumber(text, regex) {
      var match;
      var lastNum = null;
      while ((match = regex.exec(text)) !== null) {
        lastNum = parseInt(match[1], 10);
      }
      return lastNum;
    }

    function parseTextData(text) {
      var cleanText = text.replace(/\s+/g, '');
      var parts = cleanText.split(/(\d{4}\/\d{1,2}\/\d{1,2})/);

      orders = {}; 
      var balancesFound = []; 

      for (var i = 1; i < parts.length; i += 2) {
        var dateStr = parts[i];
        var contentStr = parts[i+1] || "";

        var dateMatch = dateStr.match(/(\d{4})\/(\d{1,2})\/(\d{1,2})/);
        if (!dateMatch) continue;
        
        var y = parseInt(dateMatch[1], 10);
        var m = parseInt(dateMatch[2], 10) - 1; 
        var d = parseInt(dateMatch[3], 10);
        
        var actualOrderDate = new Date(y, m, d);
        actualOrderDate.setDate(actualOrderDate.getDate() + 1);
        
        var currentDate = getLocalDateString(actualOrderDate);
        
        if (!orders[currentDate]) {
          orders[currentDate] = { isHoliday: false, noodles: 0, eggPancake: 0, friedNoodles: 0, hasInfo: false };
        }

        var nMatch = getLastMatchNumber(contentStr, /麵線(\d+)/g);
        if (nMatch !== null) { orders[currentDate].noodles = nMatch; orders[currentDate].hasInfo = true; }

        var eMatch = getLastMatchNumber(contentStr, /蛋餅(\d+)/g);
        if (eMatch !== null) { orders[currentDate].eggPancake = eMatch; orders[currentDate].hasInfo = true; }

        var fMatch = getLastMatchNumber(contentStr, /炒麵(\d+)/g);
        if (fMatch !== null) { orders[currentDate].friedNoodles = fMatch; orders[currentDate].hasInfo = true; }

        var bRegex = /結餘[:：]?(-?\d+)/g;
        var bMatch;
        while ((bMatch = bRegex.exec(contentStr)) !== null) {
          balancesFound.push({ date: currentDate, amount: parseInt(bMatch[1], 10) });
        }
      }

      for (var dateKey in orders) {
        if (!orders[dateKey].hasInfo) {
          orders[dateKey].isHoliday = true;
        }
      }

      var targetStartDate = new Date(document.getElementById("startDate").value);
      var latestBalance = null;
      var latestBalanceDate = new Date(0);

      for (var j = 0; j < balancesFound.length; j++) {
        var bDate = new Date(balancesFound[j].date);
        if (bDate < targetStartDate) {
          if (bDate >= latestBalanceDate) {
            latestBalanceDate = bDate;
            latestBalance = balancesFound[j].amount;
          }
        }
      }

      var currentBalanceInput = document.getElementById("balanceInput").value.trim();
      if (latestBalance !== null && currentBalanceInput === "") {
        document.getElementById("balanceInput").value = latestBalance;
      }

      generateTable();
    }

    function generateTable() {
      var startDate = new Date(document.getElementById("startDate").value);
      var endDate = new Date(document.getElementById("endDate").value);

      var html = "<table>";
      html += "<tr><th>日期</th><th>麵線</th><th>蛋餅</th><th>炒麵</th><th>金額</th></tr>";
      var overallTotalAmount = 0;

      for (var d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
        var isoDate = getLocalDateString(d);
        
        if (!orders[isoDate]) {
          orders[isoDate] = { isHoliday: true, noodles: 0, eggPancake: 0, friedNoodles: 0 };
        }

        var month = (d.getMonth() + 1).toString();
        var day = d.getDate().toString();
        var weekday = weekdays[d.getDay()];
        if (month.length < 2) month = '0' + month;
        if (day.length < 2) day = '0' + day;
        var displayDate = month + '/' + day + '/' + weekday;
        
        var dailyTotalAmount = 0;
        var rowContent = "";

        if (orders[isoDate].isHoliday) {
          rowContent = "<td colspan='3'>休假</td><td>0</td>";
        } else {
          dailyTotalAmount =
            orders[isoDate].noodles * prices.noodles +
            orders[isoDate].eggPancake * prices.eggPancake +
            orders[isoDate].friedNoodles * prices.friedNoodles;
            
          rowContent =
            "<td>" + (orders[isoDate].noodles || '') + "</td>" +
            "<td>" + (orders[isoDate].eggPancake || '') + "</td>" +
            "<td>" + (orders[isoDate].friedNoodles || '') + "</td>" +
            "<td>" + dailyTotalAmount + "</td>";
        }

        overallTotalAmount += dailyTotalAmount;
        html += "<tr onclick=\"openModal('" + isoDate + "')\"><td>" + displayDate + "</td>" + rowContent + "</tr>";
      }

      html += "<tr><td colspan='4'>總計</td><td>" + overallTotalAmount + "</td></tr>";
      html += "</table>";

      var balanceText = document.getElementById("balanceInput").value.trim();
      var advanceText = document.getElementById("advanceInput").value.trim();
      var balanceValue = (balanceText === "") ? 0 : parseFloat(balanceText);
      var advanceValue = (advanceText === "") ? 0 : parseFloat(advanceText);
      
      var finalBalance = (balanceValue + advanceValue) - overallTotalAmount;
      
      var startDisplay = (startDate.getMonth()+1) + '/' + startDate.getDate();
      var endDisplay = (endDate.getMonth()+1) + '/' + endDate.getDate();
      
      var summaryHtml = "<div class='summary' onclick='openBalanceModal()'>";
      summaryHtml += startDisplay + " 結餘: " + ((balanceText==="") ? "無" : balanceValue) + "<br>";
      summaryHtml += endDisplay + " 預收: " + ((advanceText==="") ? "無" : advanceValue) + "<br>";
      summaryHtml += "最終結餘: " + ((balanceText === "" && advanceText === "") ? "無" : finalBalance);
      summaryHtml += "</div>";
      
      html += summaryHtml;

      document.getElementById("report").innerHTML = html;
      document.getElementById("downloadBtn").style.display = "block";
    }

    function openModal(isoDate) {
      currentEditDate = isoDate;
      var d = new Date(isoDate);
      var displayDate = (d.getMonth() + 1) + '/' + d.getDate() + '/' + weekdays[d.getDay()];
      
      document.getElementById("modalDate").textContent = displayDate;
      document.getElementById("modalIsHoliday").checked = orders[isoDate].isHoliday;
      
      toggleModalInputs();
      
      document.getElementById("modalNoodlesQty").value = orders[isoDate].noodles;
      document.getElementById("modalEggPancakeQty").value = orders[isoDate].eggPancake;
      document.getElementById("modalFriedNoodlesQty").value = orders[isoDate].friedNoodles;
      
      document.getElementById("modalOverlay").style.display = "block";
    }

    function toggleModalInputs() {
      var isHoliday = document.getElementById("modalIsHoliday").checked;
      document.getElementById("modalNoodlesQty").disabled = isHoliday;
      document.getElementById("modalEggPancakeQty").disabled = isHoliday;
      document.getElementById("modalFriedNoodlesQty").disabled = isHoliday;
    }

    function closeModal() {
      document.getElementById("modalOverlay").style.display = "none";
      currentEditDate = null;
    }

    function saveOrder() {
      if (!currentEditDate) return;
      var isHoliday = document.getElementById("modalIsHoliday").checked;
      
      if (!orders[currentEditDate]) {
        orders[currentEditDate] = {};
      }
      
      orders[currentEditDate].isHoliday = isHoliday;
      
      if (isHoliday) {
        orders[currentEditDate].noodles = 0;
        orders[currentEditDate].eggPancake = 0;
        orders[currentEditDate].friedNoodles = 0;
      } else {
        orders[currentEditDate].noodles = parseInt(document.getElementById("modalNoodlesQty").value) || 0;
        orders[currentEditDate].eggPancake = parseInt(document.getElementById("modalEggPancakeQty").value) || 0;
        orders[currentEditDate].friedNoodles = parseInt(document.getElementById("modalFriedNoodlesQty").value) || 0;
      }
      generateTable();
      closeModal();
    }

    function openBalanceModal() {
      document.getElementById("modalBalance").value = document.getElementById("balanceInput").value;
      document.getElementById("modalAdvance").value = document.getElementById("advanceInput").value;
      document.getElementById("balanceModalOverlay").style.display = "block";
    }

    function closeBalanceModal() {
      document.getElementById("balanceModalOverlay").style.display = "none";
    }

    function saveBalance() {
      document.getElementById("balanceInput").value = document.getElementById("modalBalance").value;
      document.getElementById("advanceInput").value = document.getElementById("modalAdvance").value;
      generateTable(); 
      closeBalanceModal();
    }

    function downloadReport() {
      var reportDiv = document.getElementById("report");
      html2canvas(reportDiv).then(function(canvas) {
        var ctx = canvas.getContext("2d");
        var imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        var data = imgData.data;
        
        // 像素轉換為灰階
        for (var i = 0; i < data.length; i += 4) {
          var gray = data[i] * 0.3 + data[i+1] * 0.59 + data[i+2] * 0.11;
          data[i] = gray;
          data[i+1] = gray;
          data[i+2] = gray;
        }
        ctx.putImageData(imgData, 0, 0);

        // 輸出為 60% 品質的 JPG 以縮小檔案
        var link = document.createElement("a");
        link.href = canvas.toDataURL("image/jpeg", 0.6);
        link.download = "report.jpg";
        link.click();
      });
    }
  </script>
</body>
</html>
